<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      overflow: hidden;
    }

    /* ── COUNTDOWN VIEW ── */
    #countdown-view { text-align: center; padding: 2rem; }

    #event-title {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 500;
      color: #a78bfa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      min-height: 1.6rem;
    }

    .timer-grid {
      display: flex;
      gap: clamp(1rem, 4vw, 2.5rem);
      align-items: flex-start;
      justify-content: center;
    }

    .time-block { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }

    .time-number {
      font-size: clamp(3rem, 12vw, 6.5rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .time-label {
      font-size: clamp(0.6rem, 2vw, 0.8rem);
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .colon {
      font-size: clamp(2.5rem, 10vw, 5.5rem);
      font-weight: 700;
      color: #4b5563;
      line-height: 1;
      margin-top: 0.05em;
      /* blink every second */
      animation: blink 1s step-start infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    #timesup {
      margin-top: 2rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 600;
      color: #f87171;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: none;
    }

    #invalid-msg {
      font-size: 1.1rem;
      color: #f87171;
      text-align: center;
      padding: 2rem;
      display: none;
    }

    /* ── BUILDER VIEW ── */
    #builder-view {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 1.25rem;
      padding: clamp(1.5rem, 5vw, 2.5rem);
      width: min(420px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    #builder-view h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.04em;
      text-align: center;
    }

    #builder-view p.sub {
      text-align: center;
      color: #6b7280;
      font-size: 0.82rem;
      margin-top: -0.8rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.45rem; }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="datetime-local"] {
      background: #0f0f13;
      border: 1px solid #2e2e42;
      border-radius: 0.6rem;
      color: #f0f0f0;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #7c3aed; }
    input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

    #generate-btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 0.65rem;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #generate-btn:hover  { background: #6d28d9; }
    #generate-btn:active { transform: scale(0.98); }

    /* generated link area */
    #link-box {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
    }

    #link-output {
      background: #0f0f13;
      border: 1px solid #2e2e42;
      border-radius: 0.6rem;
      color: #a78bfa;
      font-size: 0.78rem;
      padding: 0.65rem 0.9rem;
      word-break: break-all;
      line-height: 1.5;
      cursor: text;
      user-select: all;
    }

    #copy-btn {
      background: #1e1e2e;
      border: 1px solid #3b3b55;
      color: #c4b5fd;
      border-radius: 0.55rem;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.05em;
    }
    #copy-btn:hover { background: #2a2a3e; }

    .hint {
      font-size: 0.74rem;
      color: #4b5563;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- COUNTDOWN VIEW (shown when ?end= exists) -->
  <div id="countdown-view" style="display:none;">
    <div id="event-title"></div>
    <div class="timer-grid">
      <div class="time-block">
        <span class="time-number" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <span class="colon">:</span>
      <div class="time-block">
        <span class="time-number" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <span class="colon">:</span>
      <div class="time-block">
        <span class="time-number" id="mins">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <span class="colon">:</span>
      <div class="time-block">
        <span class="time-number" id="secs">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </div>
    <div id="timesup">⏰ Time's Up!</div>
  </div>

  <!-- INVALID DATE MESSAGE -->
  <div id="invalid-msg">⚠️ Invalid or missing <code>end</code> date parameter.</div>

  <!-- BUILDER VIEW (shown when no ?end= param) -->
  <div id="builder-view" style="display:none;">
    <h1>⏱ Countdown Builder</h1>
    <p class="sub">Generate an embeddable countdown link</p>

    <div class="field">
      <label for="b-title">Event Title <span style="color:#4b5563">(optional)</span></label>
      <input type="text" id="b-title" placeholder="e.g. Exam Day, Product Launch…" maxlength="60" />
    </div>

    <div class="field">
      <label for="b-end">Target Date &amp; Time *</label>
      <input type="datetime-local" id="b-end" />
    </div>

    <button id="generate-btn">Generate Link</button>

    <div id="link-box">
      <div id="link-output"></div>
      <button id="copy-btn">📋 Copy Link</button>
      <p class="hint">Paste this URL into a Notion /embed block.<br/>The link works standalone too.</p>
    </div>
  </div>

  <script>
    /* ── HELPERS ── */
    const pad = n => String(n).padStart(2, '0');

    // Parse URL search params cleanly
    const params = new URLSearchParams(window.location.search);
    const endParam   = params.get('end');
    const titleParam = params.get('title');

    /* ── ROUTE: no end param → show BUILDER ── */
    if (!endParam) {
      document.getElementById('builder-view').style.display = 'flex';

      const generateBtn = document.getElementById('generate-btn');
      const linkBox     = document.getElementById('link-box');
      const linkOutput  = document.getElementById('link-output');
      const copyBtn     = document.getElementById('copy-btn');

      generateBtn.addEventListener('click', () => {
        const endVal   = document.getElementById('b-end').value;
        const titleVal = document.getElementById('b-title').value.trim();

        // Validate date input
        if (!endVal) { alert('Please select a target date and time.'); return; }

        const testDate = new Date(endVal);
        if (isNaN(testDate.getTime())) { alert('Invalid date selected.'); return; }
        if (testDate <= new Date()) { alert('Please choose a future date and time.'); return; }

        // Build URL using current page as base
        const base = window.location.origin + window.location.pathname;
        const url  = new URL(base);
        url.searchParams.set('end', endVal);        // keep as-is (datetime-local format)
        if (titleVal) url.searchParams.set('title', titleVal);

        linkOutput.textContent = url.toString();
        linkBox.style.display  = 'flex';
      });

      copyBtn.addEventListener('click', () => {
        const text = linkOutput.textContent;
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = '✅ Copied!';
          setTimeout(() => { copyBtn.textContent = '📋 Copy Link'; }, 2000);
        }).catch(() => {
          // Fallback for non-secure contexts
          const sel = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(linkOutput);
          sel.removeAllRanges();
          sel.addRange(range);
        });
      });

    } else {
      /* ── ROUTE: end param present → show COUNTDOWN ── */
      const endTime = new Date(endParam).getTime(); // local time, no TZ conversion

      // Guard: invalid date
      if (isNaN(endTime)) {
        document.getElementById('invalid-msg').style.display = 'block';
      } else {
        document.getElementById('countdown-view').style.display = 'block';

        // Set title if provided
        const titleEl = document.getElementById('event-title');
        if (titleParam) titleEl.textContent = titleParam;

        const daysEl  = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minsEl  = document.getElementById('mins');
        const secsEl  = document.getElementById('secs');
        const timesup = document.getElementById('timesup');

        let intervalId = null; // track interval for cleanup

        function tick() {
          let diff = endTime - Date.now(); // raw ms difference

          // Clamp: never go negative
          if (diff < 0) diff = 0;

          // Decompose ms into time units
          const d = Math.floor(diff / 86400000);
          const h = Math.floor((diff % 86400000) / 3600000);
          const m = Math.floor((diff % 3600000)  / 60000);
          const s = Math.floor((diff % 60000)    / 1000);

          daysEl.textContent  = pad(d);
          hoursEl.textContent = pad(h);
          minsEl.textContent  = pad(m);
          secsEl.textContent  = pad(s);

          // Done: show message, stop interval
          if (diff === 0) {
            timesup.style.display = 'block';
            clearInterval(intervalId);
            intervalId = null;
          }
        }

        tick(); // run immediately so there's no 1s blank delay
        intervalId = setInterval(tick, 1000);
      }
    }
  </script>
</body>
</html>
